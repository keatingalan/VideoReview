<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Competition Videos</title>
	<script src="/vis-timeline-graph2d.min.js"></script>
    <link href="/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />
    <style>
        @font-face {
			font-family: "DM Sans";
			src: url('/DMSans-VariableFont_opsz,wght.ttf') format("truetype-variations");
		}
	    body {
			font-family:"DM Sans", sans-serif; 
			background-color: rgb(233, 233, 233);
		}
		
		div#clock {font-size:85%; text-align:center;}
        table {
            width: 100%;
            min-height: 10em;
            /*max-height: 55vh;*/
            overflow-y: scroll;
            overflow-x: ellipsis;
            vertical-align: top;
        }
        td#logcolumn {width: 40vw;min-width:30em;max-height: 30em;}
        table#table {font-size: 60%;}
        /* ── Tabbed panel ── */
        .tab-panel {
            flex: 1 1 68%;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #444;
        }
        .tab-btn {
            padding: 6px 18px;
            border: none;
            border-bottom: none;
            background: #ccc;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95em;
            border-radius: 6px 6px 0 0;
            margin-right: 3px;
            color: #333;
        }
        .tab-btn.active {
            background: #444;
            color: #fff;
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: flex; flex-direction: column; }

        /* video pane */
        #pane-video {
            position: relative;
        }
        #pane-video video {
            width: 100%;
            height: 50vh;
            min-height: 150px;
            background: darkgrey;
            display: block;
        }

        /* Overlay toolbar — top-right of the video, fades in on hover */
        #video-btn-toolbar {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            display: flex;
            flex-direction: row;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        #pane-video:hover #video-btn-toolbar { opacity: 1; pointer-events: auto; }

        #record-btn {
            display: none;               /* hidden until state classes applied */
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            background: rgba(0,0,0,0.25);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            backdrop-filter: blur(3px);
            transition: background 0.15s;
        }
        #record-btn:hover { background: rgba(0,0,0,0.6); color: #fff; }
        #record-btn.ready     { display: flex; }
        #record-btn.recording:hover { background: rgba(160,0,0,0.6); color: #fff; }
        #record-btn.recording {
            display: flex;
            background: rgba(160,0,0,0.35);
            border-color: rgba(255,80,80,0.5);
            animation: rec-pulse 1s ease-in-out infinite;
        }
        @keyframes rec-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        /* event table pane */
        #pane-scores {
            overflow-x: auto;
            max-height: 50vh;
            overflow-y: auto;
        }
        #score-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 85%;
        }
        #score-table th {
            background: #444;
            color: #fff;
            padding: 6px 10px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        #score-table td {
            padding: 5px 10px;
            border-bottom: 1px solid #ccc;
        }
        #score-table tr:nth-child(even) td { background: #f0f0f0; }
        #score-table tr:hover td { background: #dce8ff; }
    
        .vis-item {
            font-size: 80%;
            margin-top: 1px;
            margin-bottom: 1px;
        }
        #timeline-vis { font-size: 80%; }
        img {height: 12em;}
        h1#heading {margin: 10px 0px 10px 0px }
        .flex-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1%;
            margin-bottom: 1em;
        }

        .video-column {
            flex: 1 1 68%;
            min-width: 300px;
        }

        .control-column {
            flex: 1 1 30%;
            min-width: 16em;
            display: flex;
            flex-direction: column;
            justify-content:space-around;
            gap: 0.5em;
        }
        .control-column button {
            width: 100%;
            box-sizing: border-box;
        }
        .control-column label button {
            width: auto;
        }
        .btn-pair {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5em;
        }
        .btn-pair button {
            flex: 1 0 max-content;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            min-height: 60px;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
         /* ── Video file items — filmstrip style ── */
        .vis-item.video-file {
            background-color: #7a8a9a;
            border: 1px solid #4a5a6a;
            border-top-color: #8a9aaa;
            border-bottom-color: #8a9aaa;
            color: #fff;
            border-radius: 2px;
            font-size: 74%;
            opacity: 0.95;
            /* Sprocket holes: repeating squares top and bottom */
            background-image:
                /* top sprocket row */
                repeating-linear-gradient(
                    90deg,
                    transparent 0px, transparent 3px,
                    rgba(255,255,255,0.25) 3px, rgba(255,255,255,0.25) 4px,
                    transparent 4px, transparent 7px,
                    rgba(0,0,0,0.5) 7px, rgba(0,0,0,0.5) 13px,
                    transparent 13px, transparent 16px,
                    rgba(255,255,255,0.25) 16px, rgba(255,255,255,0.25) 17px,
                    transparent 17px, transparent 20px
                ),
                /* bottom sprocket row */
                repeating-linear-gradient(
                    90deg,
                    transparent 0px, transparent 3px,
                    rgba(255,255,255,0.25) 3px, rgba(255,255,255,0.25) 4px,
                    transparent 4px, transparent 7px,
                    rgba(0,0,0,0.5) 7px, rgba(0,0,0,0.5) 13px,
                    transparent 13px, transparent 16px,
                    rgba(255,255,255,0.25) 16px, rgba(255,255,255,0.25) 17px,
                    transparent 17px, transparent 20px
                ),
                /* main film body */
                linear-gradient(
                    to bottom,
                    #8a9aaa 0%, #6a7a8a 20%, #6a7a8a 80%, #8a9aaa 100%
                );
            background-size:
                20px 5px,
                20px 5px,
                100% 100%;
            background-position:
                0px 0px,
                0px bottom,
                0px 0px;
            background-repeat:
                repeat-x,
                repeat-x,
                no-repeat;
        }
        .vis-item.video-file .vis-item-content {
            padding: 2px 6px;
            margin-top: 1px;
            /* keep text in the middle strip, clear of sprocket rows */
            white-space: nowrap;
            overflow: hidden;
        }
        .vis-item.video-file.vis-selected {
            background-color: #ff9900;
            border-color: #ffcc44;
            border-top-color: #ffe088;
            border-bottom-color: #ffe088;
            color: #000;
            opacity: 1;
            box-shadow: 0 0 0 2px #ffcc44, 0 0 10px 2px rgba(255,180,0,0.6);
            background-image:
                repeating-linear-gradient(
                    90deg,
                    transparent 0px, transparent 3px,
                    rgba(0,0,0,0.35) 3px, rgba(0,0,0,0.35) 4px,
                    transparent 4px, transparent 7px,
                    rgba(0,0,0,0.55) 7px, rgba(0,0,0,0.55) 13px,
                    transparent 13px, transparent 16px,
                    rgba(0,0,0,0.35) 16px, rgba(0,0,0,0.35) 17px,
                    transparent 17px, transparent 20px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px, transparent 3px,
                    rgba(0,0,0,0.35) 3px, rgba(0,0,0,0.35) 4px,
                    transparent 4px, transparent 7px,
                    rgba(0,0,0,0.55) 7px, rgba(0,0,0,0.55) 13px,
                    transparent 13px, transparent 16px,
                    rgba(0,0,0,0.35) 16px, rgba(0,0,0,0.35) 17px,
                    transparent 17px, transparent 20px
                ),
                linear-gradient(to bottom, #ffb700 0%, #ff9900 20%, #ff9900 80%, #ffb700 100%);
            background-size: 20px 5px, 20px 5px, 100% 100%;
            background-position: 0px 0px, 0px bottom, 0px 0px;
            background-repeat: repeat-x, repeat-x, no-repeat;
        }
        /* group label styling for video vs event rows */
        .vis-label.video-group .vis-inner {
            color: #7090bb;
            font-style: italic;
            font-size: 90%;
        }
        .vis-label.event-group .vis-inner {
            font-weight: bold;
            color: #222;
        }
	</style>
</head>

<script type="text/javascript" src="/mediainfo.js"></script>

<script>
    setInterval(updateScreen,200);
    function updateScreen() {
        document.getElementById("clock").innerHTML=new Date().toTimeString().substr(0,8)
        if (playbackStartTime != null) {
            const player = document.getElementById('player');
            if (!player.paused && !player.ended) {
                timeline.setCustomTime(new Date(Number(playbackStartTime)+player.currentTime*1000))
            }
        } else {
            try{timeline.removeCustomTime()} catch(e){}
        }
    }
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            var addresses=JSON.parse(xhr.responseText)
            var interfaces=Object.keys(addresses)
            var address_string=''
            if(interfaces.length==1) {
                address_string='https://'+addresses[interfaces[0]]+':3000/'
            } else {
                for(var i=0;i<interfaces.length;i++) {
                    address_string=(i==0?'':address_string+' or ')+'https://'+addresses[interfaces[i]]+':3000/'+' ('+interfaces[i]+')'
                }
            }
        }
    };
    xhr.open("GET", "/ip", true);
    xhr.send();
    refreshVideos=()=>{
        document.getElementById('loading-overlay').style.display = 'flex'
        //Now put in the events:
        fetch('/eventlist')
        .then(data=>data.json())
        .then(data=> { 
            //Clear out timeline
            items.clear()
            groups.clear()
            if(data) {//Show routines — build all groups+items in one pass, then batch-add
                const APPARATUS_ORDER = ['Vault','Bars','Beam','Floor'];
                const newGroups = new Map();
                const newItems = [];
                // itemContent: #competitor · club · name (play buttons inserted after load)
                data.forEach((m) => {
                    const server = m.server || 'unknown';
                    const groupId = 'E|' + server + '|' + m.apparatus;
                    if (!newGroups.has(groupId)) {
                        newGroups.set(groupId, {
                            id: groupId,
                            content: m.apparatus + ' <span style="font-size:80%;opacity:0.6">' + server + '</span>',
                            className: 'event-group',
                            subgroupStack: true
                        });
                    }
                    const hasDuration = (m.time_stop - m.time_start > 0);
                    newItems.push({
                        id: m.id,
                        group: groupId,
                        start: m.time_start,
                        end: (m.time_stop ? m.time_stop : undefined),
                        type: (hasDuration ? 'range' : 'point'),
                        className: 'event-item',
                        // content: #num [play buttons injected later] club · name
                        content: m.competitor + ' · ' + m.club + ' · ' + m.name,
                        title: '<small>' + m.competitor + '<br />' + m.club + '<br />' + m.name + '</small>'
                    });
                });
                // Sort groups: known apparatus in fixed order per server, unknowns appended
                const sortedGroups = Array.from(newGroups.values()).sort((a, b) => {
                    // Extract apparatus name (part after last '|')
                    const appA = a.id.split('|').pop();
                    const appB = b.id.split('|').pop();
                    const srvA = a.id.split('|')[1];
                    const srvB = b.id.split('|')[1];
                    // Primary sort: server, Secondary: apparatus order
                    if (srvA !== srvB) return srvA < srvB ? -1 : 1;
                    const iA = APPARATUS_ORDER.indexOf(appA);
                    const iB = APPARATUS_ORDER.indexOf(appB);
                    const oA = iA === -1 ? 999 : iA;
                    const oB = iB === -1 ? 999 : iB;
                    return oA - oB;
                });
                groups.add(sortedGroups);  // single batch, ordered
                items.add(newItems);        // single batch
            }
            //start fetching videos
            fetch('/videolist')
            .then(data=>data.json())
            .then(data=> { 
                if (data!=null) {
                    const newVideoGroups = new Map();
                    const newVideoItems = [];
                    const routineUpdates = [];
                    data.forEach(v=>{
                        if(v.camera_desc!=null) {
                            const groupId = 'V|' + v.camera_desc;
                            if (!newVideoGroups.has(groupId)) {
                                newVideoGroups.set(groupId, {
                                    id: groupId,
                                    content: '\u{1F4F9} ' + v.camera_desc,
                                    className: 'video-group'
                                });
                            }
                            newVideoItems.push({
                                id: v.filename,
                                group: groupId,
                                start: new Date(v.start_time),
                                end: new Date(v.start_time + v.length),
                                className: 'video-file',
                                title: v.filename
                            });
                        } else if (v.routine_id!=null) {
                            const existing = items.get(v.routine_id);
                            if (existing) {
                                // Insert play button after the competitor number (first token before ' · ')
                                const playBtn = '<span class="play-btn" data-video="' + v.filename + '" style="cursor:pointer;border:1px solid rgba(255,255,255,0.5);border-radius:3px;padding:0 2px">&#x23F5;</span> ';
                                const dotIdx = existing.content.indexOf(' · ');
                                const newContent = dotIdx >= 0
                                    ? existing.content.slice(0, dotIdx) + ' ' + playBtn + existing.content.slice(dotIdx + 3)
                                    : playBtn + existing.content;
                                routineUpdates.push({ id: v.routine_id, content: newContent });
                            }
                        }
                    });
                    groups.add(Array.from(newVideoGroups.values())); // single batch
                    items.add(newVideoItems);                        // single batch
                    if (routineUpdates.length) items.update(routineUpdates); // single batch
                }
                setTimeout(()=>{
                    document.getElementById('loading-overlay').style.display = 'none'
                    hideEmptyGroups()
                    },150)
            })            
        })
    }

    zoomToItem = (itemId, zoomMargin = 0.25, zoomSeconds=90 )=>{
        const item = items.get(itemId);
        if (!item) return;

        const start = new Date(item.start);
        const end = item.end ? new Date(item.end) : start;
        const duration = end - start || 0;
        const margin = (duration==0?zoomSeconds*1000:duration * zoomMargin)

        const windowStart = new Date(start.getTime() - margin);
        const windowEnd = new Date(end.getTime() + margin);

        timeline.setWindow(windowStart, windowEnd, { animation: true });
    }

    function hideEmptyGroups() {
        const range = timeline.getWindow(); // Get current visible window
        const allGroups = groups.get();

        // Get IDs of groups that have at least one visible item
        const groupsWithVisibleItems = new Set();

        allItems.forEach(item => {
            const itemStart = new Date(item.start);
            const itemEnd = item.end ? new Date(item.end) : itemStart;

            const isVisible =
            (itemEnd >= range.start && itemStart <= range.end); // Overlaps with window

            if (isVisible) {
            groupsWithVisibleItems.add(item.group);
            }
        });

        // Filter the groups to only those that have visible items
        const visibleGroups = allGroups.filter(group => groupsWithVisibleItems.has(group.id));

        // Re-set the groups on the timeline (this doesn’t remove items, just hides their groups)
        timeline.setGroups(visibleGroups);
    }

    // Fetch a file and return its Uint8Array
    async function fetchVideoFile(url) {
      const res = await fetch('/video/'+url);
      return new Uint8Array(await res.arrayBuffer());
    }

    // Map EBML codec ID to MediaSource codec string
    function extractCodec(track) {
        // Video fallback
        if (track['@type'] === 'Video') {
            if (track.Format === 'AVC') {
                // Profile/Level → avc1.640028 (High@L4.0)
                const profileIDC = {
                    'Baseline': '42',
                    'Main': '4D',
                    'High': '64',
                }[track.Format_Profile] || '42';

                const levelHex = (parseFloat(track.Format_Level || '3.0') * 10).toString(16).padStart(2, '0');
                return `avc1.${profileIDC}00${levelHex}`;
            }

            if (track.Format === 'HEVC') return 'hvc1';
            if (track.Format === 'VP8') return 'vp8';
            if (track.Format === 'VP9') return 'vp9';
            if (track.Format === 'AV1') return 'av01';
        }
        if (track['@type'] === 'Audio') {
            if (track.Format === 'AAC') return 'mp4a.40.2';
            if (track.Format === 'MP3') return 'mp3';
            if (track.Format === 'Opus') return 'opus';
            if (track.Format === 'Vorbis') return 'vorbis';
            if (track.Format === 'FLAC') return 'flac';
        }

        return null;
    }
    function inferMimeType(format) {
        const map = {
            'MPEG-4': 'video/mp4',
            'MPEG Audio': 'audio/mpeg',
            'MPEG Video': 'video/mpeg',
            'Matroska': 'video/webm',
            'WebM': 'video/webm',
            'AVI': 'video/x-msvideo',
            'Wave': 'audio/wav',
            'AAC': 'audio/aac',
            'FLAC': 'audio/flac',
            'Opus': 'audio/ogg',
            'Ogg': 'audio/ogg',
            'QuickTime': 'video/quicktime',
            'WMV': 'video/x-ms-wmv',
            'RealMedia': 'application/vnd.rn-realmedia',
            '3GP': 'video/3gpp',
        };
        return map[format] || 'application/octet-stream';
    }
    function getMimeTypeAndCodecs(mediaInfoResult) {
        const tracks = mediaInfoResult?.media?.track || [];

        const generalTrack = tracks.find(t => t['@type'] === 'General');
        const mimeType = generalTrack?.MimeType || inferMimeType(generalTrack?.Format || '');

        const codecTracks = tracks.filter(t => ['Video', 'Audio'].includes(t['@type']));
        const codecs = codecTracks.map(track => extractCodec(track)).filter(Boolean);

        return `${mimeType}; codecs="${codecs.join(', ')}"`;
    }
    var playbackStartTime = null;
    
    function setDownloadBtn(state) {
        // state: 'hidden' | 'buffering' | 'ready'
        const rec = document.getElementById('record-btn');
        rec.className = '';
        if (state === 'buffering') {
            // record button not yet useful while buffering
        } else if (state === 'ready') {

        }

    }

    // ── Clip recording via MediaRecorder ────────────────────────────────────────
    var _clipRecorder   = null;
    var _clipChunks     = [];
    var _clipMime       = '';
    var _clipStartVideo = 0;   // video.currentTime when recording started

    function toggleClipRecording() {
        if (_clipRecorder && _clipRecorder.state === 'recording') {
            _stopClip();
        } else {
            _startClip();
        }
    }

    function _startClip() {
        const video = document.getElementById('player');
        if (!video.srcObject && !video.src) return;

        // Prefer webm/vp8 as it is universally supported by MediaRecorder.
        // Fall back to whatever the browser supports.
        const preferredMime = ['video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4']
            .find(m => MediaRecorder.isTypeSupported(m)) || '';

        let stream;
        try {
            stream = video.captureStream();
        } catch(e) {
            alert('captureStream() not supported in this browser.');
            return;
        }

        _clipChunks = [];
        _clipMime   = preferredMime;
        _clipStartVideo = video.currentTime;

        _clipRecorder = new MediaRecorder(stream, preferredMime ? { mimeType: preferredMime } : {});
        _clipRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) _clipChunks.push(e.data); };
        _clipRecorder.onstop = _finishClip;
        _clipRecorder.start(1000); // collect data every 100 ms

        // Update button appearance
        const btn = document.getElementById('record-btn');
        const lbl = document.getElementById('record-btn-label');
        btn.className = 'recording';
        lbl.textContent = 'Stop';
    }

    function _stopClip() {
        if (_clipRecorder && _clipRecorder.state !== 'inactive') {
            _clipRecorder.stop();
        }
    }

    function _finishClip() {
        if (_clipChunks.length === 0) return;

        const mimeBase = (_clipMime || 'video/webm').split(';')[0];
        const ext = mimeBase.includes('mp4') ? 'mp4' : 'webm';

        // Build a filename that includes the wall-clock start time of the clip
        let ts = 'clip';
        if (playbackStartTime) {
            const clipWall = new Date(Number(playbackStartTime) + _clipStartVideo * 1000);
            ts = 'clip_' + clipWall.getFullYear() + '-' +
                 String(clipWall.getMonth()+1).padStart(2,'0') + '-' +
                 String(clipWall.getDate()).padStart(2,'0') + '_' +
                 String(clipWall.getHours()).padStart(2,'0') +
                 String(clipWall.getMinutes()).padStart(2,'0') +
                 String(clipWall.getSeconds()).padStart(2,'0');
        }

        const blob = new Blob(_clipChunks, { type: mimeBase });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = ts + '.' + ext;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 10000);

        // Reset button back to ready state
        const btn = document.getElementById('record-btn');
        const lbl = document.getElementById('record-btn-label');
        btn.className = 'ready';
        lbl.textContent = 'Rec';
        _clipRecorder = null;
    }

    async function startPlayback() { // returns Promise; caller switches to video tab
        recordedChunks = [];
        setDownloadBtn('hidden');

        try {
            playbackStartTime=new Date(Number(videosToAppend[0].split("!")[1])-Number(videosToAppend[0].split("!")[2].split(".")[0]))
            document.getElementById('videodesc').innerHTML=": "+videosToAppend[0].split("!")[0]+" from "+playbackStartTime.getDate()+"/"+(playbackStartTime.getMonth()+1)+"/"+playbackStartTime.getFullYear()+" "+String(playbackStartTime.getHours()).padStart(2,"0")+":"+String(playbackStartTime.getMinutes()).padStart(2,"0")
        } catch (e) {
            document.getElementById('videodesc').innerHTML=""
        }
        try {timeline.removeCustomTime()} catch(e){}
		timeline.addCustomTime(playbackStartTime)

		const firstFilename = videosToAppend.shift();
        const firstFile = await fetchVideoFile(firstFilename);
        const mi = await MediaInfo.mediaInfoFactory({locateFile:(path,prefix)=>{return '/MediaInfoModule.wasm'}});
        const readChunk = async (chunkSize, offset) => firstFile.slice(offset, offset + chunkSize)
        const result = await mi.analyzeData(firstFile.byteLength, readChunk)
        const mime = getMimeTypeAndCodecs(result);
       
        const mediaSource = new MediaSource();
        document.getElementById('player').src = URL.createObjectURL(mediaSource);
        setDownloadBtn('buffering');
		
        mediaSource.addEventListener('sourceopen', async () => {
            const sourceBuffer = mediaSource.addSourceBuffer(mime);
            sourceBuffer.mode = 'segments';

            // Track whether all chunks (including queued ones) have been appended
            let remainingAtStart = videosToAppend.length + 1; // +1 for firstFile
            let appended = 0;

            // Start time of the first file — defines t=0 in the MSE timeline
            const firstFileStartTime = Number(firstFilename.split('!')[1]) - Number(firstFilename.split('!')[2].split('.')[0]);

            // Returns the MSE timestampOffset (seconds) for a given filename
            function mseOffsetForFile(filename) {
                try {
                    const fileStartTime = Number(filename.split('!')[1]) - Number(filename.split('!')[2].split('.')[0]);
                    return (fileStartTime - firstFileStartTime) / 1000;
                } catch(e) {
                    return 0;
                }
            }


            function onChunkAppended(chunk) {
                recordedChunks.push(chunk);
                appended++;
                if (appended >= remainingAtStart) {
                    setDownloadBtn('ready');
                }
            }

            appendNext = async () => {
                if (!sourceBuffer.updating) {
                    if (videosToAppend.length <= 0) {
                        if (mediaSource.readyState !== 'ended') {
                            mediaSource.endOfStream();
                        }
                        return;
                    }
                    const filename = videosToAppend.shift();
                    const chunk = await fetchVideoFile(filename);
                    onChunkAppended(chunk);
                    sourceBuffer.timestampOffset = mseOffsetForFile(filename);
                    sourceBuffer.appendBuffer(chunk);
                }
            }
            sourceBuffer.addEventListener('updateend', appendNext);
            sourceBuffer.timestampOffset = 0; // First file always starts at t=0
            onChunkAppended(firstFile);
            sourceBuffer.appendBuffer(firstFile);
        });
    }
    document.getElementById('player').addEventListener('waiting',(e)=>{
        //Sometimes end up with small gaps in the buffer, so if we are waiting, try skipping forward up to 1s in 5ms steps
        let totalSkipped = 0;
		console.log('Encountered buffering in video at '+document.getElementById('player').currentTime+'. Skipping to keep playing');
        

        function skipFwd() {
            if (!document.getElementById('player').paused && !document.getElementById('player').seeking && document.getElementById('player').readyState >= 3) {
                // Video is no longer buffering
                console.log('Playback resumed at '+document.getElementById('player').currentTime+'.');
                return;
            }

            if (totalSkipped >= 1) {
                console.warn('Max skip time reached. Still buffering.');
                return;
            }

            document.getElementById('player').currentTime += 0.020;
            totalSkipped += 0.020;
            
            // Wait a bit and try again
            setTimeout(skipFwd, 20); // check every 20ms
        }

        skipFwd();
    })

    // ── Event table ───────────────────────────────────────────────────────────

    function formatTime(ms) {
        const d = new Date(ms);
        const now = new Date();

        const time = d.toLocaleTimeString('en-GB'); // hh:mm:ss

        const isToday = d.toDateString() === now.toDateString();
        if (isToday) return time;

        const dateStr = d.toLocaleDateString('en-GB', {
            day: 'numeric',
            month: 'short',
            year: '2-digit'
        }); // e.g. "6 Mar 25"

        return `${time} ${dateStr}`;
    }

    // recentScores holds all rows as objects so we can re-render without a full fetch
    var recentScores = [];
    function renderScoresTable() {
        const tbody = document.getElementById('score-table-body');
        if (recentScores.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="color:#888;font-style:italic">No scores yet</td></tr>';
            return;
        }
        //Remove duplicates (same id) that can occur when the same score is received via WebSocket and fetched via API at the same time, keeping the most recent one
        recentScores.sort((a,b)=>b.time_score - a.time_score) // Sort by most recent score
        const seenRoutines = new Set();
        recentScores = recentScores.filter(m => {
            if (seenRoutines.has(m.competitor+"|"+m.apparatus+"|"+m.server)) return false;
            seenRoutines.add(m.competitor+"|"+m.apparatus+"|"+m.server);
            return true;
        });

        tbody.innerHTML = recentScores.map(m => {
            const statusClass = 'status-' + (m.status || '');
            const icon = m.status === 'competing' ? '&#x25B6; ' : m.status === 'stopped' ? '&#x25A0; ' : '';
            return `<tr id='score-${m.id}' onclick="zoomToItem(${m.id})">
                <td>${m.apparatus || ''}</td>
                <td>${m.competitor ?? ''}</td>
                <td>${m.name || ''}${m.club ? ' (' + m.club + ')' : ''}</td>
                <td>${m.d != null && m.d!='' ? Number(m.d).toFixed(1) : ''}</td>
                <td>${m.e != null  && m.e!='' ? Number(m.e).toFixed(3) : ''}</td>
                <td>${m.nd != null  && m.nd!='' ? Number(m.nd).toFixed(1) : ''}</td>
                <td>${m.final_score != null  && m.final_score!='' ? Number(m.final_score).toFixed(3) : ''}</td>
                <td>${formatTime(m.time_score)}</td>
            </tr>`;
        }).join('');
    }
    // Populate table from the eventlist API (called by refreshVideos already)
    function refreshScoresTable() {
        fetch('/scorelist')
            .then(r => r.json())
            .then(data => {
                recentScores=data
                renderScoresTable()
            })
            .catch(() => {});
    }
    refreshScoresTable();

    // ── WebSocket – live event updates ────────────────────────────────────────
    //
    // The server broadcasts JSON status messages on /ws whenever a UDP
    // message is received from a keypad or iPad controller.
    //
    // Message shape:
    // {
    //   server:     "192.168.1.x",   // source IP
    //   status:     "competing" | "stopped" | "scoring" | "ready",
    //   apparatus:  "Vault" | "Bars" | "Beam" | "Floor",
    //   competitor: "42",
    //   firstName:  "Jane",
    //   surname:    "Doe",
    //   club:       "TST",
    //   time:       1718000000000    // Unix ms
    // }

    (function connectWebSocket() {
        const ws = new WebSocket((window.location.protocol=="https:"?'wss://':'ws://') + location.host + '/ws'); 

        ws.addEventListener('open', () => {
            console.log('WebSocket connected');
        });

        ws.addEventListener('message', (event) => {
            let msg;
            try { msg = JSON.parse(event.data); } catch(e) { return; }
            if (msg.time_score) {
                // Append to live scores table
                recentScores.unshift(msg);
                renderScoresTable();
            }
            // Also add to the vis timeline without a full reload
            const wsServer = msg.server || 'unknown';
            const wsGroupId = 'E|' + wsServer + '|' + msg.apparatus;
            try {
                groups.add({
                    id: wsGroupId,
                    content: msg.apparatus + ' <span style="font-size:80%;opacity:0.6">' + wsServer + '</span>',
                    className: 'event-group',
                    subgroupStack: true
                });
            } catch(e) { /* duplicate – ignore */ }
            try {
                items.update({
                    id: msg.id,
                    group: wsGroupId,
                    start: msg.time_start,
                    end: (msg.time_stop ? msg.time_stop : undefined),
                    type: (msg.time_stop - msg.time_start > 0 ? 'range' : 'point'),
                    className: 'event-item',
                    content: msg.competitor + ' · ' + msg.club + ' · ' + msg.name,
                    title: '<small>' + msg.competitor + '<br />' + msg.club + '<br />' + msg.name + '</small>'
                });
            } catch(e) {            }
        })
        
        ws.addEventListener('close', () => {
            console.log('WebSocket closed – reconnecting in 3 s');
            setTimeout(connectWebSocket, 3000);
        });

        ws.addEventListener('error', (e) => {
            console.warn('WebSocket error', e);
            ws.close();
        });
    })();
